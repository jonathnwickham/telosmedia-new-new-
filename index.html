    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do you design the emails or do we send them to you?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We design and write everything. The only thing we need from you are brand assets, product photos and lifestyle imagery. If you don't have brand guidelines, we'll build every email around the aesthetic of your site so the work stays fully aligned with the rest of your brand."
          }
        },
        {
          "@type": "Question",
          "name": "How do you measure success?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Revenue first. Percentage of revenue attributed to email, retention rate, and LTV. Open rates and click rates sit underneath that as diagnostics. We also pull attribution from Triple Whale or Hyros depending on what you already use, and we cross-check the numbers wherever we can because we know the industries you work in and need to make sure every result is real."
          }
        },
        {
          "@type": "Question",
          "name": "What platforms do you work with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Klaviyo, Omnisend, and Brevo are the stacks we run most often. If you're on a different ESP, we'll look at fit first. As long as the partnership makes sense, we can figure the rest out."
          }
        },
        {
          "@type": "Question",
          "name": "What's the minimum engagement?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work with a small number of brands at a time so we can ship like operators, not vendors. Engagements start at 90 days, then month-to-month after that. No long lock-ins. Three months gives us enough room to build properly, even though you'll usually see results within the first one or two."
          }
        },
        {
          "@type": "Question",
          "name": "Do you do SMS or WhatsApp too?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, but only when the channel actually fits. Some brands win with SMS. Some can't run it without compliance headaches. That's where WhatsApp earns its place. We'll do the fit assessment first and only ship what makes you money."
          }
        },
        {
          "@type": "Question",
          "name": "How long until we see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Foundational lifts show inside the first 30 to 60 days, especially once new flows you've never had go live. The full picture lands by the 90-day mark, once segmentation, deliverability, and campaign cadence have all stacked up."
          }
        }
      ]
    }
    </script>
